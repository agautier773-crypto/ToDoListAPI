spring.application.name=demoAPI
server.port = 8080

# Bdd
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# cf partie 4 pour + d'infos : https://www.baeldung.com/spring-boot-data-sql-and-schema-sql
spring.jpa.hibernate.ddl-auto=none
# Spring exťcute schema.sql + data.sql ŗ chaque dťmarrage
spring.sql.init.mode=always

# data.sql s'exťcute APR»S qu'Hibernate a initialisť JPA
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false
# afficher les requetes SQL dans le terminal
# https://www.baeldung.com/sql-logging-spring-boot
spring.jpa.properties.hibernate.format_sql=true
#
logging.level.net.ttddyy.dsproxy.listener=debug